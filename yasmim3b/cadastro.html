<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
</head>

<body>
    <h1 align="center">Cadastro de Usuário</h1>
    <form action="login.html">
        <p align="center"><label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome" required><br><br></p>

        <p align="center"><label for="endereco">Endereço Completo:</label><br>
            <textarea id="endereco" name="endereco"></textarea><br><br></p>

        <p align="center"><label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" required><br><br></p>

        <p align="center"><label for="login">Login:</label><br>
            <input type="text" id="login" name="login" required><br><br></p>

        <p align="center"><label for="senha">Senha:</label><br>
            <input type="password" id="senha" name="senha" required><br><br></p>

        <p align="center"><label for="confSenha">Confirmação de Senha:</label><br>
            <input type="password" id="confSenha" name="confSenha" required><br><br></p>

        <p align="center"><button type="submit">Cadastrar</button></p>
        <p align="center"><button type="reset">Limpar</button></p>
    </form>
    <br>
    <p align="center"><a href="login.html">Voltar para Login</a></p>
</body>

</html>
