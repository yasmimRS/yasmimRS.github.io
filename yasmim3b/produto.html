<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produto</title>
</head>

<body>
    <h1 align="center">Cadastro de Produto/Item</h1>

    <form action="entrar.html">
        <p align="center">
            <label>Nome do Produto:</label><br>
            <input type="text" required>
        </p>

        <p align="center">
            <label>Descrição:</label><br>
            <textarea rows="3"></textarea>
        </p>

        <p align="center">
            <label>Unidade de Medida:</label><br>
            <input type="text" placeholder="Ex: KG, Unidade, Litro">
        </p>

        <p align="center">
            <label>Quantidade:</label><br>
            <input type="number" required>
        </p>

        <p align="center">
            <label>Valor:</label><br>
            <input type="text" placeholder="R$ 0,00">
        </p>

        <p align="center">
            <button type="submit">Cadastrar Item</button>
        </p>
    </form>

    <p align="center">
        <p align="center"><a href="login.html">Voltar para Login</a></p>
    </p>
</body>

</html>
